<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MOOV Sales">
<title>MOOV Sales</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html{height:100%;}
body{height:100%;font-family:'Heebo','Arial Hebrew',Arial,sans-serif;background:#f0f0f0;overflow:hidden;}
#app{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;
  background:#f5f5f5;overflow:hidden;
}
/* Header */
.hdr{flex-shrink:0;padding:12px 14px 10px;background:#1a73e8;color:#fff;transition:background .25s;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
.hdr-mid{text-align:center;flex:1;}
.hdr-mid h1{font-size:16px;font-weight:600;margin:0;}
.hdr-mid p{font-size:11px;opacity:.75;margin:0;}
.hdr-mid p.inv-totals{font-size:15px;font-weight:700;opacity:1;margin:2px 0 0;letter-spacing:.2px;}
.hdr-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;width:36px;height:36px;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.hdr-btn.hidden{visibility:hidden;}
/* Content */
#content{
  flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}
/* Bottom Nav */
.bnav{flex-shrink:0;display:flex;background:#fff;border-top:1px solid #e0e0e0;padding-bottom:env(safe-area-inset-bottom);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px 9px;border:none;background:transparent;cursor:pointer;font-family:inherit;border-top:2.5px solid transparent;transition:border-color .2s,color .2s,background .2s;color:#aaa;}
.bnav-btn .ico{font-size:18px;margin-bottom:2px;}
.bnav-btn .lbl{font-size:9px;font-weight:500;white-space:nowrap;line-height:1;}
/* Search */
.sbar{background:#fff;border-bottom:1px solid #ebebeb;padding:10px 12px;position:sticky;top:0;z-index:10;}
.swrap{position:relative;}
.sinput{width:100%;padding:10px 36px 10px 30px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:inherit;background:#f8f8f8;outline:none;direction:rtl;-webkit-appearance:none;}
.sico{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
.sclr{position:absolute;left:9px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;color:#bbb;cursor:pointer;line-height:1;}
.smeta{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:#aaa;}
.sref{background:none;border:none;font-size:11px;font-family:inherit;cursor:pointer;}
/* Cards */
.card{margin:0 10px 5px;border-radius:11px;overflow:hidden;border:1.5px solid rgba(0,0,0,.06);box-shadow:0 1px 3px rgba(0,0,0,.06);}
.card.exp{border-color:var(--tc);box-shadow:0 3px 14px rgba(0,0,0,.12);}
.card-hdr{padding:12px 14px;cursor:pointer;user-select:none;}
.r1{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap;}
.r2{display:flex;gap:9px;font-size:12px;color:#555;flex-wrap:wrap;align-items:center;}
.r3{margin-top:5px;display:flex;justify-content:space-between;align-items:center;}
.card-body{border-top:1.5px solid rgba(0,0,0,.07);padding:12px 14px 14px;background:#fff;}
.cust-name{font-weight:600;font-size:15px;color:#1a1a1a;flex-shrink:0;max-width:44%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.biz-name{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.toggle-hint{font-size:11px;}
.id-badge{font-size:12px;color:#444;background:rgba(0,0,0,.09);border-radius:6px;padding:2px 8px;font-family:monospace;letter-spacing:1px;flex-shrink:0;}
.copy-btn{border:1px solid rgba(0,0,0,.18);border-radius:6px;padding:2px 8px;font-size:11px;background:rgba(255,255,255,.6);color:#444;cursor:pointer;font-family:inherit;flex-shrink:0;}
.copy-btn.done{color:#fff;}
.tag{font-size:11px;background:rgba(0,0,0,.08);border-radius:5px;padding:1px 7px;color:#444;white-space:nowrap;}
.tag.blue{background:#ddeeff;color:#1a73e8;}
.nbadge{color:#fff;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:600;display:inline-block;}
/* Grid / Detail */
.sec-t{font-size:11px;font-weight:600;color:#aaa;margin-bottom:8px;letter-spacing:.5px;}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;}
.gcell{background:#f8f8f8;border-radius:8px;padding:8px 10px;border:.5px solid #ebebeb;}
.gcell.wide{grid-column:span 2;}
.glabel{font-size:10px;color:#aaa;margin-bottom:2px;}
.gval{font-size:13px;font-weight:500;color:#222;word-break:break-all;}
.dtable{background:#fff;border-radius:10px;border:.5px solid #ebebeb;overflow:hidden;margin-bottom:10px;}
.dthead{padding:8px 12px;font-size:12px;font-weight:600;color:#fff;display:flex;justify-content:space-between;}
.dtrow{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-top:.5px solid #f0f0f0;}
.dtlabel{font-size:12px;color:#666;flex-shrink:0;padding-left:8px;}
.dtval{font-size:13px;font-weight:500;color:#222;text-align:left;direction:ltr;max-width:55%;overflow:hidden;text-overflow:ellipsis;}
.prod-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:.5px solid #f0f0f0;}
.prod-em{font-size:20px;margin-left:8px;}
.prod-name{font-size:13px;font-weight:500;color:#222;}
.prod-sub{font-size:10px;color:#aaa;}
.prod-qty{font-size:15px;font-weight:700;}
/* Sticky totals bar */
.sticky-totals{
  position:sticky;top:0;z-index:20;
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;margin:-14px -14px 14px;
  color:#fff;
  border-bottom:1.5px solid rgba(255,255,255,.2);
}
.sticky-totals .st-cans{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.sticky-totals .st-total{font-size:19px;font-weight:700;}
.fdivider{display:flex;align-items:center;gap:10px;margin:16px 0 13px;}
.fdivider hr{flex:1;border:none;border-top:.5px solid #ddd;}
.fdivider span{font-size:12px;font-weight:600;color:#aaa;white-space:nowrap;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:13px;font-weight:500;color:#555;margin-bottom:4px;}
.field label small{font-size:11px;color:#bbb;font-weight:400;}
.finput{display:block;width:100%;padding:10px 13px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;font-family:inherit;background:#f8f8f8;outline:none;direction:rtl;-webkit-appearance:none;transition:border-color .2s;}
.finput:focus{border-color:var(--tc,#1a73e8);background:#fff;}
.finput.num{direction:ltr;text-align:right;font-family:monospace;letter-spacing:1px;}
select.finput{cursor:pointer;}
textarea.finput{resize:vertical;min-height:65px;font-size:14px;line-height:1.5;}
.irow{display:flex;gap:8px;}
.dash-btn{padding:10px 16px;border-radius:10px;border:1.5px solid var(--tc,#1a73e8);background:transparent;color:var(--tc,#1a73e8);font-size:22px;font-weight:700;line-height:1;cursor:pointer;flex-shrink:0;}
.save-btn{width:100%;padding:13px;border-radius:10px;color:#fff;border:none;font-size:16px;font-weight:600;margin-top:12px;cursor:pointer;-webkit-appearance:none;transition:background 0.2s;}
.save-btn:disabled{background:#ccc !important;cursor:not-allowed;}
/* Product qty row in form */
.prod-field{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:.5px solid #f0f0f0;direction:ltr;}
.prod-field:last-child{border-bottom:none;}
.pf-left{display:flex;align-items:center;gap:8px;}
.pf-em{font-size:20px;margin-left:0;margin-right:8px;}
.pf-name{font-size:13px;font-weight:500;color:#222;}
.pf-sub{font-size:10px;color:#aaa;}
.pf-input{width:72px;padding:7px 8px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:15px;font-weight:600;text-align:center;font-family:monospace;background:#f8f8f8;-webkit-appearance:none;outline:none;flex-shrink:0;}
.pf-input:focus{border-color:var(--tc,#1a73e8);background:#fff;}
/* Calc row */
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#f8f8f8;border-radius:8px;margin-bottom:6px;}
.calc-label{font-size:12px;color:#666;}
.calc-val{font-size:13px;font-weight:600;color:#222;}
.calc-val.hi{color:var(--tc,#1a73e8);font-size:15px;}
/* Customer suggest */
.field-wrap{position:relative;}
.suggest-box{position:absolute;top:100%;right:0;left:0;background:#fff;border:1.5px solid #e0e0e0;border-top:none;border-radius:0 0 10px 10px;max-height:150px;overflow-y:auto;z-index:30;box-shadow:0 4px 12px rgba(0,0,0,.1);}
.sug-item{padding:9px 13px;cursor:pointer;font-size:14px;color:#333;border-top:.5px solid #f5f5f5;}
.sug-item:first-child{border-top:none;}
.sug-item:active{background:#f0f4ff;}
.sug-sub{font-size:11px;color:#aaa;margin-top:1px;}
/* Alert */
.alert{padding:12px 14px;border-radius:10px;font-weight:500;text-align:center;font-size:14px;margin-bottom:12px;}
.alert.ok{background:#e6f4ea;color:#1e8e3e;}
.alert.err{background:#fce8e6;color:#c62828;}
/* Status */
.status{padding:48px 16px;text-align:center;}
.spinner{width:36px;height:36px;border:3px solid #f0f0f0;border-top-color:#1a73e8;border-radius:50%;margin:0 auto 14px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* Settings */
.set-wrap{padding:14px 14px 40px;}
.stitle{font-size:11px;font-weight:600;color:#aaa;margin:14px 0 6px;letter-spacing:.5px;}
.stitle:first-child{margin-top:0;}
.scard{background:#fff;border-radius:12px;border:.5px solid #ebebeb;overflow:hidden;margin-bottom:4px;}
.srow{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-top:.5px solid #f0f0f0;}
.srow:first-child{border-top:none;}
.slabel{font-size:13px;color:#444;font-weight:500;}
.sval{font-size:11px;color:#aaa;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:ltr;}
.sbtn{background:none;border:none;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;}
.sbtn.red{color:#c62828;}.sbtn.blue{color:#1a73e8;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:4px;vertical-align:middle;}
.diag-box{background:#111827;border-radius:10px;padding:12px;margin-top:10px;direction:ltr;text-align:left;}
.diag-sheet{margin-bottom:12px;}
.diag-name{font-size:12px;font-weight:600;color:#60a5fa;margin-bottom:5px;}
.diag-grid{display:flex;flex-wrap:wrap;gap:4px;}
.dcell{background:#1e3a5f;border-radius:4px;padding:2px 7px;font-size:10px;font-family:monospace;}
.dk{color:#93c5fd;}.dv{color:#86efac;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:bottom;}
.derr{color:#f87171;font-size:11px;}
.url-input{width:100%;padding:12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:13px;font-family:inherit;background:#f8f8f8;outline:none;direction:ltr;text-align:left;-webkit-appearance:none;margin-bottom:10px;}
.url-input:focus{border-color:#1a73e8;background:#fff;}
.url-input.err{border-color:#c62828;}
.url-err{font-size:12px;color:#c62828;margin-bottom:8px;display:none;}
.save-url-btn{width:100%;padding:13px;border-radius:10px;background:#1a73e8;color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;}
/* Setup */
.setup-screen{display:flex;flex-direction:column;height:100%;}
.setup-hero{background:linear-gradient(135deg,#1a73e8,#0d47a1);padding:36px 24px 28px;text-align:center;color:#fff;flex-shrink:0;}
.setup-hero .logo{font-size:48px;margin-bottom:8px;}
.setup-hero h2{font-size:22px;font-weight:700;margin-bottom:3px;}
.setup-hero p{font-size:13px;opacity:.8;line-height:1.5;margin:0;}
.setup-body{flex:1;overflow-y:auto;padding:18px 14px 30px;}
.setup-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:.5px solid #e8e8e8;}
.setup-card h3{font-size:14px;font-weight:600;color:#222;margin-bottom:10px;}
.step-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;}
.step-num{background:#1a73e8;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
.step-txt{font-size:13px;color:#444;line-height:1.5;flex:1;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);max-width:360px;width:calc(100% - 32px);padding:13px 16px;border-radius:12px;font-size:14px;font-weight:600;text-align:center;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:slideUp .2s ease;}
.toast.err{background:#c62828;color:#fff;}
.toast.ok{background:#1e8e3e;color:#fff;}
@keyframes slideUp{from{opacity:0;bottom:60px}to{opacity:1;bottom:80px}}
</style>
</head>
<body>
<div id="app">
  <div id="toast-container"></div>
  <div class="hdr" id="hdr">
    <div class="hdr-row">
      <button class="hdr-btn" id="back-btn"></button>
      <div class="hdr-mid"><h1 id="hdr-title">לקוחות</h1><p id="hdr-sub">מיקאל קולמן | MOOV</p></div>
      <button class="hdr-btn hidden" id="right-btn"></button>
    </div>
  </div>
  <div id="content"></div>
  <div class="bnav" id="bnav">
    <button class="bnav-btn" data-tab="customers" onclick="switchTab('customers')"><span class="ico">👥</span><span class="lbl">לקוחות</span></button>
    <button class="bnav-btn" data-tab="invoices"  onclick="switchTab('invoices')"><span class="ico">📄</span><span class="lbl">חשבוניות</span></button>
    <button class="bnav-btn" data-tab="receipts"  onclick="switchTab('receipts')"><span class="ico">🧾</span><span class="lbl">קבלות</span></button>
    <button class="bnav-btn" data-tab="tax"       onclick="switchTab('tax')"><span class="ico">📋</span><span class="lbl">חשמ"ק</span></button>
  </div>
</div>
<script>
// ── Config ──
const STORAGE_KEY='moov_url_v4';
const VAT=0.18;

// ─────────────────────────────────────────────────────────
// ⚙️ CENTRAL MAPPING (CONFIG) ⚙️
// When you add new SKUs and your columns shift right,
// just update the letters below. The app will adapt instantly.
// ─────────────────────────────────────────────────────────
const COLS = {
  // -- 1. Shared Invoices & Tax (חשבוניות / חשמ"ק) --
  docCustId: 'A',      // ת"ז / ח"פ
  docCustName: 'B',    // שם העסק
  docDate: 'C',        // תאריך
  
  price: 'Z',          // מחיר ליחידה
  subtotal: 'AA',      // סה"כ לפני מע"מ
  discount: 'AB',      // הנחה
  afterDisc: 'AC',     // סה"כ אחר הנחה
  
  // -- 2. Invoices Specific (חשבוניות) --
  invTerms: 'AD',      // תנאי תשלום
  invTotalVat: 'AE',   // סה"כ כולל מע"מ
  invNum: 'AF',        // מספר חשבונית
  invPayType: 'AG',    // סוג תשלום
  invPayAmt: 'AH',     // סכום התשלום
  invPayDate: 'AI',    // תאריך פרעון שיק
  invChkNum: 'AJ',     // מספר שיק
  invNotes: 'AK',      // הערות
  
  // -- 3. Tax Specific (חשבוניות/קבלות) --
  taxTotalVat: 'AD',   // סה"כ כולל מע"מ
  taxPayType: 'AE',    // סוג תשלום
  taxPayAmt: 'AF',     // סכום התשלום
  taxPayDate: 'AG',    // תאריך פרעון שיק
  taxChkNum: 'AH',     // מספר שיק
  taxPhoto: 'AI',      // צילום שיק
  taxNotes: 'AJ',      // הערות
  taxNum: 'AK',        // מספר חשבונית מס / קבלה

  // -- 4. Receipts (קבלות) --
  recInvNum: 'A',      // מספר חשבונית
  recPayType: 'B',     // סוג תשלום
  recPayAmt: 'C',      // סכום התשלום
  recPayDate: 'D',     // תאריך
  recChkNum: 'E',      // מספר שיק
  recPhoto: 'F',       // צילום שיק
  recNotes: 'G',       // הערות
  recCustName: 'H',    // לקוח
  recCustId: 'I',      // ת"ז/ח"פ
  recNum: 'J',         // מס קבלה

  // -- 5. Customers (לקוחות) --
  custName: 'A',       
  custId: 'B',         
  custBiz: 'C',        
  custPhone: 'D',      
  custEmail: 'E',      
  custStreet: 'F',     
  custCity: 'G',       
  custBankHolder: 'H', 
  custBankName: 'I',   
  custBankBranch: 'J', 
  custBankAcct: 'K'    
};
// ─────────────────────────────────────────────────────────

const TABS={
  customers:{label:'לקוחות',         color:'#1a73e8',bg:'#e8f0fe'},
  invoices: {label:'חשבוניות',        color:'#d67000',bg:'#fff3e0'},
  receipts: {label:'קבלות',           color:'#1e8e3e',bg:'#e6f4ea'},
  tax:      {label:'חשבוניות/קבלות', color:'#7b1fa2',bg:'#f3e5f5'},
};
const SHEETS={customers:'לקוחות',invoices:'חשבוניות',receipts:'קבלות',tax:'חשבוניות/קבלות'};
const PAYMENT_TYPES=['מזומן','שיק'];

const CF=[
  {k:COLS.custName,label:'שם לקוח',      mode:'text',req:true},
  {k:COLS.custId,label:'ת"ז / ח"פ',   mode:'num', copy:true},
  {k:COLS.custBiz,label:'שם העסק',       mode:'text'},
  {k:COLS.custPhone,label:'טלפון',         mode:'tel'},
  {k:COLS.custEmail,label:'כתובת מייל',    mode:'email'},
  {k:COLS.custStreet,label:'רחוב ומספר',    mode:'text'},
  {k:COLS.custCity,label:'עיר',           mode:'text'},
  {k:COLS.custBankHolder,label:'שם בעל החשבון', mode:'text',bank:true},
  {k:COLS.custBankName,label:'שם הבנק',       mode:'text',bank:true},
  {k:COLS.custBankBranch,label:'מספר הסניף',    mode:'num', bank:true},
  {k:COLS.custBankAcct,label:'מספר חשבון',    mode:'num', bank:true},
];

const PRODS=[
  {nk:'D',qk:'E', name:'Blueberry Mint 10 - אוכמניות',     short:'Blueberry Mint 10', heb:'אוכמניות',    nic:10,em:'🫐'},
  {nk:'F',qk:'G', name:'Blueberry Mint 6 - אוכמניות',      short:'Blueberry Mint 6',  heb:'אוכמניות',    nic:6, em:'🫐'},
  {nk:'H',qk:'I', name:'Jalapeno Lime 14 - חלפיניו ליים',  short:'Jalapeno Lime 14',  heb:'חלפיניו ליים',nic:14,em:'🌶'},
  {nk:'J',qk:'K', name:'Jalapeno Lime 6 - חלפיניו ליים',   short:'Jalapeno Lime 6',   heb:'חלפיניו ליים',nic:6, em:'🌶'},
  {nk:'L',qk:'M', name:'Peppermint 20 - מנטה',             short:'Peppermint 20',     heb:'מנטה',        nic:20,em:'🌿'},
  {nk:'N',qk:'O', name:'Peppermint 10 - מנטה',             short:'Peppermint 10',     heb:'מנטה',        nic:10,em:'🌿'},

function taxFormErrors(){

function tod(){
  const d=new Date();
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}
function dateToISO(s){
  if(!s)return new Date().toISOString().slice(0,10);
  const p=s.split('/');
  if(p.length===3)return p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
  return new Date().toISOString().slice(0,10);
}
function isoToHeb(s){
  if(!s)return '';
  const p=s.split('-');
  if(p.length===3)return p[2]+'/'+p[1]+'/'+p[0];
  return s;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function nz(x){return x&&x!=='0'&&x!=='0.00'?x:'';}
function fmt(x){
  const n=parseFloat((x||'').toString().replace(/[^0-9.]/g,''));
  if(isNaN(n)||n===0)return x||'';
  return '₪'+n.toLocaleString('he-IL',{minimumFractionDigits:0,maximumFractionDigits:2});
}
function fmtNum(n){return n.toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtPhone(x){
  if(!x)return x;
  const d=x.replace(/\D/g,'');
  if(d.length===10&&d.startsWith('0'))return d.slice(0,3)+'-'+d.slice(3);
  if(d.length===9&&d.startsWith('0'))return d.slice(0,2)+'-'+d.slice(2);
  return x;
}
function isBusy(e){const m=(e?.message||'').toLowerCase();return m.includes('quota')||m.includes('rate')||m.includes('limit')||m.includes('429');}
function rowBg(r,isExp){
  if(isExp)return'#ffffff';
  const bg=(r._bg||'#ffffff').toLowerCase().replace(/\s/g,'');
  return(bg==='#ffffff'||bg==='#fff'||bg===''||bg==='white')?'#ffffff':bg;
}
function calcInv(f){
  const price=parseFloat(f[COLS.price])||0;
  const totalQty=PRODS.reduce((s,p)=>s+(parseInt(f[p.qk])||0),0);
  const aa=price*totalQty;
  const disc=parseFloat(f[COLS.discount])||0;
  const ac=aa*(1-disc/100);
  const withVat=ac*(1+VAT);
  return{totalQty,aa,disc,ac,withVat};
}

// ── API ──
async function apiFetch(params){
  if(!S.scriptUrl)throw new Error('NO_URL');
  const r=await fetch(S.scriptUrl+'?'+new URLSearchParams(params));
  if(!r.ok)throw new Error('HTTP '+r.status);
  const d=await r.json();
  if(d.error)throw new Error(d.error+(d.available?' | '+d.available.join(', '):''));
  return d;
}

function apiPost(body){
  if(!S.scriptUrl) return Promise.resolve({status:'ok'});
  return fetch(S.scriptUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body),
    mode: 'no-cors'
  }).then(() => { return {status: 'ok'}; })
    .catch((e) => { console.error(e); return {status: 'ok'}; });
}

async function pingSheets(){
  try{
    const d=await apiFetch({});
    if(d.sheets){
      S.availableSheets=d.sheets;
      d.sheets.forEach(n=>{
        n=n.trim();
        if(n==='לקוחות')              SHEETS.customers=n;
        else if(n.includes('/'))      SHEETS.tax=n;
        else if(/^חשבוניות$/.test(n)) SHEETS.invoices=n;
        else if(/^קבלות$/.test(n))    SHEETS.receipts=n;
      });
    }
  }catch(e){console.error('ping',e);}
}

async function runDiagnose(){
  S.diagRunning=true;render();S.diagData={};
  for(const tab of['customers','invoices','receipts','tax']){
    try{
      const d=await apiFetch({sheet:SHEETS[tab],limit:1});
      S.diagData[tab]={sheetName:SHEETS[tab],firstRow:(d.data||[])[0]||null};
    }catch(e){S.diagData[tab]={sheetName:SHEETS[tab],error:e.message};}
  }
  S.diagRunning=false;render();
}

// ── Loaders ──
async function loadAny(tab,stateKey,limit,req){
  S[stateKey]='loading';render();
  try{
    const p={sheet:SHEETS[tab]};
    if(limit)p.limit=limit;
    if(req)p.require=req;
    const d=await apiFetch(p);
    S[tab]=(d.data||[]).map((r,i)=>({...r,_id:i,_row:i+2})); 
    S[stateKey]='ok';delete S.errors[tab];
  }catch(e){
    S[stateKey]=isBusy(e)?'busy':'error';
    S.errors[tab]=e.message;
  }
  render();
}

function isInvOpen(r){
  const bg=(r._bg||'#ffffff').toLowerCase().replace(/[^0-9a-f]/g,'');
  if(bg.length<6)return true;
  const R=parseInt(bg.slice(0,2),16);
  const G=parseInt(bg.slice(2,4),16);
  const B=parseInt(bg.slice(4,6),16);
  return!(G>R+40&&G>B+20&&G>120);
}
function openNewReceipt(){
  S.screen='new-receipt';S.rForm=efR();S.msg=null;S.showSuggest=false;
  if(S.isState==='idle')loadInvoices();
  if(S.rsState==='idle')loadReceipts();
  setHeader();render();scrollToTop();

function parseMoney(v){return parseFloat((v||'').toString().replace(/[^0-9.]/g,''))||0;}
function getInvBalance(invNum){
  if(!invNum)return 0;
  const inv=S.invoices.find(r=>nz(r[COLS.invNum])===invNum);
  if(!inv)return 0;
  const total=parseMoney(inv[COLS.invTotalVat]);
  const paid=S.receipts
    .filter(r=>nz(r[COLS.recInvNum])===invNum)
    .reduce((s,r)=>s+parseMoney(r[COLS.recPayAmt]),0);
  return Math.max(0,total-paid);
}
function openInvsFor(custId){
  if(!custId)return[];
  return S.invoices.filter(r=>r[COLS.docCustId]===custId&&isInvOpen(r));
}
function openNewReceiptFromInv(invId){
  const r=S.invoices.find(x=>x._id===invId);
  if(!r)return;
  const rf=efR();
  rf[COLS.recInvNum]=nz(r[COLS.invNum])||'';
  rf._custId=nz(r[COLS.docCustId])||'';
  rf._custName=nz(r[COLS.docCustName])||'';
  rf._invDate=nz(r[COLS.docDate])||'';
  const invTotal=parseMoney(r[COLS.invTotalVat])||parseMoney(r[COLS.taxTotalVat])||0;
  const paidSoFar=S.receipts
    .filter(rec=>nz(rec[COLS.recInvNum])===rf[COLS.recInvNum])
    .reduce((s,rec)=>s+parseMoney(rec[COLS.recPayAmt]),0);
  rf._invTotal=String(Math.max(0,invTotal-paidSoFar));
  rf._openInvs=openInvsFor(rf._custId);
  rf._showOpenInvs=false;
  S.rForm=rf;S.tab='receipts';S.screen='new-receipt';S.msg=null;S.showSuggest=false;
  if(S.rsState==='idle')loadReceipts();
  syncNav();setHeader();render();scrollToTop();
}

        return`<div class="srow"${i===0?' style="border-top:none"':''}>
          <span class="slabel" style="font-size:12px">${lbl}</span>
          <span style="font-size:11px;color:${st==='ok'?(cnt>0?'#1e8e3e':'#f59e0b'):st==='error'?'#c62828':'#aaa'}">
            ${st==='ok'?cnt+' שורות':st==='error'?'❌ שגיאה':st==='loading'?'טוען...':'לא טעון'}
          </span></div>${err?`<div style="padding:3px 14px 8px;font-size:10px;color:#c62828;direction:ltr">${esc(err.slice(0,100))}</div>`:''}`;
      }).join('')}
    </div>
    <div class="stitle">אבחון</div>
    <div class="scard" style="padding:14px">
      <button class="save-url-btn" style="background:${S.diagRunning?'#ccc':'#37474f'}" ${S.diagRunning?'disabled':''} onclick="runDiagnose()">
        ${S.diagRunning?'⏳ מאבחן...':'🔬 הרץ אבחון'}</button>`;
    if(Object.keys(S.diagData).length){
      h+=`<div class="diag-box">`;
      ['customers','invoices','receipts','tax'].forEach(tab=>{
        const d=S.diagData[tab];if(!d)return;
        h+=`<div class="diag-sheet"><div class="diag-name">${esc(d.sheetName)}</div>`;
        if(d.error)h+=`<div class="derr">❌ ${esc(d.error)}</div>`;
        else if(!d.firstRow)h+=`<div style="color:#6b7280;font-size:11px">📭 ריק</div>`;
        else{
          const entries=Object.entries(d.firstRow).filter(([k,v])=>k!=='_bg'&&v&&String(v).trim());
          h+=entries.length?`<div class="diag-grid">${entries.slice(0,20).map(([k,v])=>`<div class="dcell"><span class="dk">${k}:</span><span class="dv">${esc(String(v).slice(0,14))}</span></div>`).join('')}</div>`:`<div style="color:#6b7280;font-size:11px">⚠️ ריק</div>`;
        }
        h+=`</div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>
    <div class="stitle">פעולות</div>
    <div class="scard">
      <div class="srow"><span class="slabel">רענן הכל</span><button class="sbtn blue" onclick="refreshAll()">↻ טען מחדש</button></div>
      <div class="srow"><span class="slabel">נקה חיבור</span><button class="sbtn red" onclick="clearUrl()">🗑 נקה</button></div>
    </div>`;
  }
  h+=`<div style="text-align:center;margin-top:14px;font-size:11px;color:#ccc">MOOV Sales App v6.15 (Dynamic Cols)</div></div>`;
  return h;
}

function saveUrl(inputId,errId){
  const inp=document.getElementById(inputId);
  const errEl=document.getElementById(errId);
  const val=(inp?.value||'').trim();
  if(!val||!val.startsWith('https://script.google.com')){
    if(inp)inp.classList.add('err');
    if(errEl){errEl.textContent='URL לא תקין';errEl.style.display='block';}return;
  }
  S.scriptUrl=val;saveUrlToLocal(val);
  resetAll();S.screen='list';S.tab='customers';
  document.getElementById('bnav').style.display='flex';
  setHeader();syncNav();pingSheets().then(()=>loadCustomers());
}
function clearUrl(){
  if(!confirm('למחוק את ה-URL?'))return;
  S.scriptUrl='';clearUrlFromLocal();
  resetAll();S.screen='list';document.getElementById('bnav').style.display='none';
  setHeader();render();
}
function resetAll(){
  S.csState='idle';S.isState='idle';S.rsState='idle';S.tsState='idle';
  S.customers=[];S.invoices=[];S.receipts=[];S.tax=[];
  S.availableSheets=[];S.diagData={};S.errors={};
}
function refreshAll(){resetAll();S.screen='list';setHeader();pingSheets().then(()=>loadCustomers());}

function filteredC(){
  if(!S.search.trim())return S.customers;
  const q=S.search.toLowerCase();
  const keys = [COLS.custName, COLS.custId, COLS.custBiz, COLS.custPhone, COLS.custEmail, COLS.custStreet, COLS.custCity];
  return S.customers.filter(c=>keys.some(k=>(c[k]||'').toLowerCase().includes(q)));
}
function renderCustList(){
  const st=S.csState;const fc=filteredC();const color=tc();
  let h=`<div class="sbar">
    <div class="swrap">
      <input class="sinput" id="sinput" type="text" placeholder='חיפוש: שם, ת"ז, טלפון, עיר...' value="${esc(S.search)}">
      <span class="sico">🔍</span>
      ${S.search?`<button class="sclr" onclick="clearSearch()">×</button>`:''}
    </div>
    <div class="smeta">
      <span id="scnt">${st==='ok'?`${fc.length} לקוחות${S.search?` (מתוך ${S.customers.length})`:''}`:'...'}</span>
      <button class="sref" style="color:${color}" onclick="loadCustomers()">↻ רענן</button>
    </div>
  </div>`;

function cCard(c,i){

  return`<div class="card${isE?' exp':''}" style="background:${bg};${isE?`--tc:${color}`:''}">

        <span class="cust-name">${esc(c[COLS.custBiz]||c[COLS.custName]||'—')}</span>

          <button class="copy-btn${cpd?' done':''}" onclick="event.stopPropagation();cp('${esc(c[COLS.custId])}','${c._id}-id')"
            style="${cpd?`background:${color};border-color:${color};color:#fff`:''}">
            ${cpd?'✓ הועתק':'📋 העתק'}</button>`:''}
        ${c[COLS.custName]&&c[COLS.custBiz]?`<span class="biz-name" style="color:#888;font-size:12px">${esc(c[COLS.custName])}</span>`:''}

        ${(c[COLS.custStreet]||c[COLS.custCity])?`<span>📍 ${esc([c[COLS.custStreet],c[COLS.custCity]].filter(Boolean).join(', '))}</span>`:''}

function cCardBody(c,color){
  let h=`<div class="card-body"><div class="sec-t">פרטי קשר</div><div class="g2" style="margin-bottom:12px">`;
  CF.filter(f=>!f.bank&&c[f.k]).forEach(f=>{
    h+=`<div class="gcell${[COLS.custEmail,COLS.custStreet].includes(f.k)?' wide':''}">
      <div class="glabel">${f.label}</div>
      <div class="gval" style="direction:${f.mode==='email'?'ltr':'rtl'}">${esc(c[f.k])}</div>
    </div>`;

  h+=`</div>`;
  const bankF=CF.filter(f=>f.bank&&c[f.k]);
  if(bankF.length){
    h+=`<div class="sec-t">🏦 פרטי בנק</div><div class="dtable">`;
    bankF.forEach((f,i)=>{h+=`<div class="dtrow"${i===0?' style="border-top:none"':''}>
      <span class="dtlabel">${f.label}</span>
      <span class="dtval" style="${[COLS.custBankBranch,COLS.custBankAcct].includes(f.k)?'font-family:monospace;letter-spacing:1px':''}">${esc(c[f.k])}</span>
    </div>`;});
    h+=`</div>`;
  }
  h+=`<button onclick="editCust(${c._id})"
    style="width:100%;margin-top:10px;padding:11px;border-radius:8px;border:1.5px solid ${color};
    background:transparent;color:${color};font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">

        oninput="uf('iForm','_overInvNum',this.value);renderSaveBtn()">
    </div>`:''}
    `:''}

    <div class="field"><label>הערות <small>(עמודה ${COLS.taxNotes})</small></label>
      <textarea class="finput" rows="3" id="inv-notes"

  rf._openInvs.forEach((inv,i)=>{

    const selected=rf[COLS.recInvNum]===invNum;
    h+=`<div class="dtrow" style="cursor:pointer;${selected?`background:${tc()}15;`:''}${i===0?'border-top:none':''}"
      onclick="pickReceiptInv('${esc(invNum)}','${balance}','${esc(invDate)}')">
      <div>
        <div style="font-size:13px;font-weight:600;color:${selected?tc():'#222'}">#${esc(invNum)}</div>
        <div style="font-size:11px;color:#888">${esc(invDate)}</div>
        ${hasPartial?`<div style="font-size:10px;color:#e65100">שולם חלקית: ₪${Math.round(rawTotal-balance).toLocaleString('he-IL')}</div>`:''}

        ${selected?`<div style="font-size:10px;color:${tc()}">✓ נבחרה</div>`:''}
      </div>
    </div>`;
  });
  h+=`</div>`;
  return h;
}

          </div>

          ${nz(r[COLS.recPayType])?`<span class="tag">${esc(r[COLS.recPayType])}</span>`:''}

              :`<span style="font-size:11px;color:#1e8e3e">✓ שולם</span>`;})()} 
        </div>
        <div class="r3" style="justify-content:flex-end">

      h+=`<div class="card-body"><div class="g2" style="margin-bottom:8px">`;

        h+=`<div class="gcell"><div class="glabel">${f.icon} ${f.label}</div>

          <div class="gval">${esc(r[f.k])}</div></div>`;

function renderDocList(data,state,isTax){
  const label=isTax?'חשבוניות/קבלות':'חשבוניות';
  const reload=isTax?'loadTax()':'loadInvoices()';
  const color=tc();const errMsg=S.errors[isTax?'tax':'invoices'];
  const totalKey=isTax?COLS.taxTotalVat:COLS.invTotalVat;
  const numKey=isTax?COLS.taxNum:COLS.invNum;
  const tail=isTax?TAX_TAIL:INV_TAIL;
  if(state==='error')return errScreen(errMsg,reload,label,color);
  if(state!=='ok')return statusHtml(state,reload,label);
  if(!data.length)return`<div class="status">
    <p style="font-size:36px;margin-bottom:10px">${isTax?'📋':'📄'}</p>
    <p style="color:#999;margin-bottom:6px">אין ${label} שהושלמו</p>
    <p style="font-size:12px;color:#bbb;margin-bottom:16px">רק שורות עם סכום מאושר יוצגו</p>
    <button onclick="${reload}" style="background:${color};color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;cursor:pointer">↻ רענן</button>
  </div>`;

  let h=`<div style="padding-bottom:24px">`;

  [...data].reverse().forEach((r,i)=>{
    const id=`${isTax?'t':'v'}-${r._id}`;const isE=S.expId===id;const bg=rowBg(r,isE);
    const totVAT=nz(r[totalKey]);const invNum=nz(r[numKey]);
    const bizName=nz(r[COLS.docCustName]);const custId=nz(r[COLS.docCustId]);const date=nz(r[COLS.docDate]);
    const prods=PRODS.filter(p=>{const q=parseFloat(r[p.qk]);return!isNaN(q)&&q>0;});
    const totItems=prods.reduce((s,p)=>s+(parseFloat(r[p.qk])||0),0);
    const balance=(!isTax&&invNum)?getInvBalance(invNum):null;
    const hasPartialPay=balance!==null&&balance<parseMoney(totVAT)-0.5;

    h+=`<div class="card${isE?' exp':''}" style="background:${bg};${isE?`--tc:${color}`:''}">
      <div class="card-hdr" onclick="tog('${id}')">
        <div class="r1">
          ${invNum?`<span class="nbadge" style="background:${color}">#${esc(invNum)}</span>`:''}
          <span style="font-weight:600;font-size:14px;color:#222;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(bizName||custId||'—')}</span>
          <div style="text-align:left;flex-shrink:0">
            ${totVAT?`<div style="font-size:15px;font-weight:700;color:${color}">${fmt(totVAT)}</div>`:''}
            ${hasPartialPay?`<div style="font-size:11px;font-weight:700;color:#e65100">יתרה: ₪${Math.round(balance).toLocaleString('he-IL')}</div>`:''}
            ${balance===0&&totVAT?`<div style="font-size:11px;color:#1e8e3e;font-weight:600">✓ שולם</div>`:''}
          </div>
        </div>
        <div class="r2">
          ${date?`<span>📅 ${esc(date)}</span>`:''}
          ${prods.slice(0,3).map(p=>`<span class="tag">${p.em} ×${r[p.qk]}</span>`).join('')}
          ${prods.length>3?`<span style="font-size:11px;color:#888">+${prods.length-3}</span>`:''}
          ${totItems>0?`<span style="font-size:11px;color:#aaa;margin-right:auto">${totItems} יח'</span>`:''}
        </div>
        <div class="r3" style="justify-content:flex-end">
          <span class="toggle-hint" style="color:${isE?color:'#bbb'}">${isE?'▲ סגור':'▼ פרטים'}</span>
        </div>
      </div>`;
    if(isE){
      h+=`<div class="card-body">
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
          ${custId?`<span class="id-badge">${esc(custId)}</span>`:''}
          ${bizName?`<span style="font-size:13px;font-weight:600">${esc(bizName)}</span>`:''}
          ${date?`<span style="font-size:12px;color:#888;margin-right:auto">📅 ${esc(date)}</span>`:''}
        </div>`;
      if(prods.length){
        h+=`<div class="dtable" style="margin-bottom:10px">
          <div class="dthead" style="background:${color}"><span>פירוט הזמנה</span><span>${totItems} יח'</span></div>`;
        prods.forEach(p=>{
          h+=`<div class="prod-row">
            <div style="display:flex;align-items:center">
              <span class="prod-em">${p.em}</span>
              <div><div class="prod-name">${p.short}</div><div class="prod-sub">${p.heb} • ${p.nic}mg</div></div>
            </div>
            <span class="prod-qty" style="color:${color}">${r[p.qk]} יח'</span>
          </div>`;
        });
        h+=`</div>`;
      }
      const pricing=[
        nz(r[COLS.price])&&{l:'מחיר ליחידה (לפני מע"מ)',vv:fmt(r[COLS.price])},
        nz(r[COLS.subtotal])&&{l:'סה"כ לפני מע"מ',vv:fmt(r[COLS.subtotal])},
        nz(r[COLS.discount])&&{l:'הנחה',vv:r[COLS.discount]+'%',disc:true},
        nz(r[COLS.afterDisc])&&{l:'סה"כ אחר הנחה (לפני מע"מ)',vv:fmt(r[COLS.afterDisc])},
        totVAT&&{l:'סה"כ כולל מע"מ',vv:fmt(totVAT),hi:true},
        hasPartialPay&&{l:'שולם עד כה',vv:`₪${Math.round(parseMoney(totVAT)-balance).toLocaleString('he-IL')}`,paid:true},
        hasPartialPay&&{l:'יתרה לתשלום',vv:`₪${Math.round(balance).toLocaleString('he-IL')}`,bal:true},
        balance===0&&totVAT&&{l:'סטטוס',vv:'✓ שולם במלואו',done:true},
      ].filter(Boolean);
      if(pricing.length){
        h+=`<div class="dtable" style="margin-bottom:10px">`;
        pricing.forEach((row,ri)=>{
          const bgStyle=row.hi?`background:${color}15`:row.bal?'background:#fff3e0':row.done?'background:#e6f4ea':'';
          const valColor=row.hi?color:row.disc?'#c62828':row.bal?'#e65100':row.done?'#1e8e3e':row.paid?'#555':'#222';
          const valSize=row.hi||row.bal?15:13;
          h+=`<div class="dtrow" style="${ri===0?'border-top:none;':''}${bgStyle}">
            <span class="dtlabel">${row.l}</span>
            <span class="dtval" style="color:${valColor};font-size:${valSize}px;font-weight:${row.hi||row.bal||row.done?700:500}">${row.vv}</span>
          </div>`;
        });
        h+=`</div>`;
      }
      const payF=tail.filter(f=>nz(r[f.k]));
      if(payF.length){
        h+=`<div class="dtable"><div style="padding:7px 12px;background:#f5f5f5;border-bottom:.5px solid #ebebeb;font-size:12px;font-weight:600;color:#666">פרטי תשלום</div>`;
        payF.filter(f=>!f.wide).forEach((f,fi)=>{h+=`<div class="dtrow"${fi===0?' style="border-top:none"':''}>
          <span class="dtlabel">${f.label}</span>
          <span class="dtval" style="color:${f.money?color:'#222'}">${f.money?fmt(r[f.k]):esc(r[f.k])}</span>
        </div>`;});
        payF.filter(f=>f.wide).forEach(f=>{h+=`<div style="padding:8px 12px;border-top:.5px solid #f0f0f0">
          <div class="glabel">${f.label}</div>
          <div style="font-size:13px;color:#222;margin-top:2px">${esc(r[f.k])}</div></div>`;});
        h+=`</div>`;
      }
      if(!isTax&&isInvOpen(r)){
        h+=`<button onclick="openNewReceiptFromInv(${r._id})"
          style="width:100%;margin-top:10px;padding:11px;border-radius:8px;border:1.5px solid ${color};
          background:transparent;color:${color};font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">
          🧾 צור קבלה לחשבונית זו
        </button>`;
      }
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  return h+`</div>`;
}

let _toastTimer=null;
function showToast(msg,type,duration){
  const c=document.getElementById('toast-container');
  if(!c)return;
  clearTimeout(_toastTimer);
  c.innerHTML=`<div class="toast ${type||'err'}">${esc(msg)}</div>`;
  _toastTimer=setTimeout(()=>{c.innerHTML='';},duration||4000);
}

function alertHtml(msg){return`<div class="alert ${msg.t==='s'?'ok':'err'}">${msg.t==='s'?'✅ ':'❌ '}${esc(msg.m)}</div>`;}
function errScreen(errMsg,reload,label,color){
  return`<div class="status"><p style="font-size:30px;margin-bottom:10px">⚠️</p>
    <p style="font-weight:600;color:#c62828;font-size:15px;margin-bottom:8px">שגיאה: ${label}</p>
    ${errMsg?`<div style="background:#fce8e6;border-radius:8px;padding:10px;margin:0 16px 16px;font-size:11px;color:#c62828;direction:ltr;word-break:break-all">${esc(errMsg.slice(0,120))}</div>`:''}
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button onclick="${reload}" style="background:${color};color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:14px;cursor:pointer">↻ נסה שוב</button>
      <button onclick="openSettings()" style="background:#37474f;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:14px;cursor:pointer">⚙️ אבחון</button>
    </div></div>`;
}
function statusHtml(state,reload,label){
  if(state==='loading'||state==='idle')
    return`<div class="status"><div class="spinner"></div><p style="color:#999;font-size:14px">טוען ${label}...</p></div>`;
  if(state==='busy')
    return`<div class="status"><p style="font-size:30px;margin-bottom:10px">🔄</p>
      <p style="font-weight:600;color:#e65100;font-size:16px;margin-bottom:8px">השרת עמוס</p>

    return;
  }

  }
}

async function saveReceipt(){
  if(S.saving)return;
  captureReceiptFields();
  const err=receiptFormErrors();
  if(err){showToast('❌ '+err,'err');return;}

  const rf=S.rForm;
  const paid=parseFloat(rf[COLS.recPayAmt])||0;
  const balance=parseFloat(rf._invTotal)||0;
  const isOverpay=rf[COLS.recPayType]==='שיק'&&balance>0.5&&paid>balance+0.5;
  const excess=isOverpay?Math.round((paid-balance)*100)/100:0;
  const inv2=rf._overInvNum?.trim()||'';

  if(balance>0.5&&paid<balance-0.5){
    const diff=Math.round(balance-paid).toLocaleString('he-IL');
    if(!confirm(`⚠️ תשלום חלקי\nשולם: ₪${Math.round(paid).toLocaleString('he-IL')}\nיתרה: ₪${Math.round(balance).toLocaleString('he-IL')}\nנותר: ₪${diff}\n\nלהמשיך?`))return;
  }

  const g1Notes=isOverpay
    ?`שיק ₪${Math.round(paid).toLocaleString('he-IL')} — יתרה חשבונית זו ₪${Math.round(balance).toLocaleString('he-IL')}. ₪${Math.round(excess).toLocaleString('he-IL')} הועברו לחשבונית מספר ${inv2||'—'}${rf[COLS.recNotes]?.trim()?' | '+rf[COLS.recNotes].trim():''}`
    :rf[COLS.recNotes]||'';
    
  const data1={
    [COLS.recInvNum]:rf[COLS.recInvNum]||'',
    [COLS.recPayType]:rf[COLS.recPayType]||'',
    [COLS.recPayAmt]:isOverpay?String(Math.round(balance*100)/100):rf[COLS.recPayAmt],
    [COLS.recPayDate]:rf[COLS.recPayDate]||tod(),
    [COLS.recChkNum]:rf[COLS.recChkNum]||'',
    [COLS.recNotes]:g1Notes,
    [COLS.recCustName]:rf._custName||'', 
    [COLS.recCustId]:rf._custId||''
  };

  S.saving=true;
  renderSaveBtnRec();
  try{
    await apiPost({action:'addReceipt', data:data1, photoBase64: rf._photoBase64 || ''});
    S.receipts.push({...data1,_id:S.receipts.length,_bg:'#ffffff'});

    if(isOverpay&&inv2){
      const g2Notes=`שיק ₪${Math.round(paid).toLocaleString('he-IL')} — ₪${Math.round(balance).toLocaleString('he-IL')} שולמו מאותו שיק עבור חשבונית מספר ${rf[COLS.recInvNum]||'—'}`;
      const data2={
        [COLS.recInvNum]:inv2,
        [COLS.recPayType]:rf[COLS.recPayType],
        [COLS.recPayAmt]:String(Math.round(excess*100)/100),
        [COLS.recPayDate]:rf[COLS.recPayDate]||tod(),
        [COLS.recChkNum]:rf[COLS.recChkNum]||'',
        [COLS.recNotes]:g2Notes,
        [COLS.recCustName]:rf._custName||'', 
        [COLS.recCustId]:rf._custId||''
      };
      await apiPost({action:'addReceipt', data:data2, photoBase64: rf._photoBase64 || ''});
      S.receipts.push({...data2,_id:S.receipts.length,_bg:'#ffffff'});
    }

    S.saving=false;
    showToast(isOverpay&&inv2?'✅ נשמרו 2 קבלות!':'✅ הקבלה נשמרה!','ok',2500);
    setTimeout(()=>{S.screen='list';S.rForm=efR();S.msg=null;setHeader();render();},1600);
  }catch(e){showToast('❌ '+(e.message||'שגיאה'),'err');S.saving=false;renderSaveBtnRec();}
}

async function saveInv(isTax){
  const f=S.iForm;
  const calc=calcInv(f);

  if(!f[COLS.docCustId]?.trim()){
    showToast('❌ ת"ז / ח"פ של הלקוח הוא שדה חובה', 'err');
    return;
  }

  if(isTax){
    const err=taxFormErrors();
    if(err){
      showToast('❌ '+err, 'err');
      return;
    }

    const paid=parseFloat(f[COLS.taxPayAmt]||0);
    const total=calc.withVat;
    if(total>0&&paid<total-0.5){
      const diff=Math.round(total-paid).toLocaleString('he-IL');
      if(!confirm(`⚠️ תשלום חלקי\nשולם: ₪${Math.round(paid).toLocaleString('he-IL')}\nלתשלום: ₪${Math.round(total).toLocaleString('he-IL')}\nיתרה: ₪${diff}\n\nלהמשיך?`))return;
    }

    if(f[COLS.taxPayType]==='שיק'&&total>0&&paid>total+0.5&&f._overInvNum?.trim()){
      const diff=Math.round(paid-total).toLocaleString('he-IL');
      const note=`ההפרש ₪${diff} שולם עבור חשבונית מספר ${f._overInvNum.trim()}`;
      f[COLS.taxNotes]=f[COLS.taxNotes]?.trim()?(f[COLS.taxNotes].trim()+' | '+note):note;
    }
  }
  
  const qkCols=PRODS.map(p=>p.qk); 
  const allowed=new Set([COLS.docCustId,COLS.docCustName,COLS.docDate,COLS.price,COLS.discount,COLS.subtotal,COLS.afterDisc,...qkCols]);
  
  if(isTax){
    [COLS.taxTotalVat,COLS.taxPayType,COLS.taxPayAmt,COLS.taxPayDate,COLS.taxChkNum,COLS.taxNotes,COLS.taxNum].forEach(k=>allowed.add(k));
  } else {
    [COLS.invTerms,COLS.invTotalVat,COLS.invNum,COLS.invPayType,COLS.invPayAmt,COLS.invPayDate,COLS.invChkNum,COLS.invNotes].forEach(k=>allowed.add(k));
  }

  const data={};
  allowed.forEach(k=>{
    const val=(f[k]||'').toString();
    const isQty=qkCols.includes(k);
    data[k]=(isQty&&(val===''||val==='0'))?'':val;
  });

  const qtySummary=PRODS.filter(p=>parseInt(data[p.qk])>0)
    .map(p=>p.short+': '+data[p.qk]).join(', ');

  S.saving=true;
  renderSaveBtn();
  try{
    const payload={
      action:isTax?'addTax':'addInvoice',
      sheetName:SHEETS[isTax?'tax':'invoices'],
      data,
      photoBase64: f._photoBase64 || ''  
    };
    
    await apiPost(payload);
    
    S.msg={t:'s',m:(isTax?'חשמ"ק':'חשבונית')+' נשמרה! '+(qtySummary||'ללא כמויות')};
    S.saving=false;render();
    setTimeout(()=>{
      S.screen='list';S.iForm={};S.msg=null;
      if(isTax){S.tsState='idle';S.tax=[];}else{S.isState='idle';S.invoices=[];}
      setHeader();if(isTax)loadTax();else loadInvoices();
    },2500);
  }catch(e){
    showToast('❌ שגיאה: '+e.name+' — '+e.message, 'err');
    S.saving=false;
    renderSaveBtn();
  }
}

function renderSaveBtn(){
  const btn=document.getElementById('btn-save-inv');
  if(!btn)return;
  const isTax = S.screen==='new-tax';
  const validErr = isTax ? taxFormErrors() : invoiceFormErrors();
  const dis = S.saving || !!validErr;
  btn.disabled = dis;
  btn.style.background = dis ? '#ccc' : tc();
  btn.textContent = S.saving ? '⏳ שומר...' : (validErr ? '⛔ ' + validErr : (isTax ? '💾 שמור חשמ"ק' : '💾 שמור חשבונית'));
}

function renderSaveBtnRec(){
  const btn=document.getElementById('btn-save-rec');
  if(!btn)return;
  const validErr = receiptFormErrors();
  const dis = S.saving || !!validErr;
  btn.disabled = dis;
  btn.style.background = dis ? '#ccc' : tc();
  btn.textContent = S.saving ? '⏳ שומר...' : (validErr ? '⛔ ' + validErr : '💾 שמור קבלה');
}

window.addEventListener('DOMContentLoaded',()=>{
  S.cForm=efC();S.rForm=efR();S.tab='customers';S.screen='list';
  setHeader();
  syncNav();
  requestAnimationFrame(syncNav);

  window.addEventListener('beforeunload',e=>{
    e.preventDefault();
    return e.returnValue='האם אתה בטוח שברצונך לצאת מהאפליקציה?';
  });

  history.pushState(null,'',location.href);
  window.addEventListener('popstate',()=>{
    if(S.screen!=='list'){
      history.pushState(null,'',location.href);
      goBack();
    }else{
      if(confirm('האם אתה בטוח שברצונך לצאת מהאפליקציה?')){
        history.back();
      }else{
        history.pushState(null,'',location.href);
      }
    }
  });

  if(S.scriptUrl){render();pingSheets().then(()=>loadCustomers());}
  else render();
});
</script>
</body>
</html>
