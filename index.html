<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MOOV Sales">
<title>MOOV Sales</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html{height:100%;}
body{height:100%;font-family:'Heebo','Arial Hebrew',Arial,sans-serif;background:#f0f0f0;overflow:hidden;}
#app{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;
  background:#f5f5f5;overflow:hidden;
}
/* Header — default blue background prevents white-on-white text */
.hdr{flex-shrink:0;padding:12px 14px 10px;background:#1a73e8;color:#fff;transition:background .25s;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
.hdr-mid{text-align:center;flex:1;}
.hdr-mid h1{font-size:16px;font-weight:600;margin:0;}
.hdr-mid p{font-size:11px;opacity:.75;margin:0;}
.hdr-mid p.inv-totals{font-size:15px;font-weight:700;opacity:1;margin:2px 0 0;letter-spacing:.2px;}
.hdr-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;width:36px;height:36px;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.hdr-btn.hidden{visibility:hidden;}
/* Content — scrollable */
#content{
  flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}
/* Bottom Nav */
.bnav{flex-shrink:0;display:flex;background:#fff;border-top:1px solid #e0e0e0;padding-bottom:env(safe-area-inset-bottom);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px 9px;border:none;background:transparent;cursor:pointer;font-family:inherit;border-top:2.5px solid transparent;transition:border-color .2s,color .2s,background .2s;color:#aaa;}
.bnav-btn .ico{font-size:18px;margin-bottom:2px;}
.bnav-btn .lbl{font-size:9px;font-weight:500;white-space:nowrap;line-height:1;}
/* Search */
.sbar{background:#fff;border-bottom:1px solid #ebebeb;padding:10px 12px;position:sticky;top:0;z-index:10;}
.swrap{position:relative;}
.sinput{width:100%;padding:10px 36px 10px 30px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:inherit;background:#f8f8f8;outline:none;direction:rtl;-webkit-appearance:none;}
.sico{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
.sclr{position:absolute;left:9px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;color:#bbb;cursor:pointer;line-height:1;}
.smeta{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:#aaa;}
.sref{background:none;border:none;font-size:11px;font-family:inherit;cursor:pointer;}
/* Cards */
.card{margin:0 10px 5px;border-radius:11px;overflow:hidden;border:1.5px solid rgba(0,0,0,.06);box-shadow:0 1px 3px rgba(0,0,0,.06);}
.card.exp{border-color:var(--tc);box-shadow:0 3px 14px rgba(0,0,0,.12);}
.card-hdr{padding:12px 14px;cursor:pointer;user-select:none;}
.r1{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap;}
.r2{display:flex;gap:9px;font-size:12px;color:#555;flex-wrap:wrap;align-items:center;}
.r3{margin-top:5px;display:flex;justify-content:space-between;align-items:center;}
.card-body{border-top:1.5px solid rgba(0,0,0,.07);padding:12px 14px 14px;background:#fff;}
.cust-name{font-weight:600;font-size:15px;color:#1a1a1a;flex-shrink:0;max-width:44%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.biz-name{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.toggle-hint{font-size:11px;}
.id-badge{font-size:12px;color:#444;background:rgba(0,0,0,.09);border-radius:6px;padding:2px 8px;font-family:monospace;letter-spacing:1px;flex-shrink:0;}
.copy-btn{border:1px solid rgba(0,0,0,.18);border-radius:6px;padding:2px 8px;font-size:11px;background:rgba(255,255,255,.6);color:#444;cursor:pointer;font-family:inherit;flex-shrink:0;}
.copy-btn.done{color:#fff;}
.tag{font-size:11px;background:rgba(0,0,0,.08);border-radius:5px;padding:1px 7px;color:#444;white-space:nowrap;}
.tag.blue{background:#ddeeff;color:#1a73e8;}
.nbadge{color:#fff;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:600;display:inline-block;}
/* Grid / Detail */
.sec-t{font-size:11px;font-weight:600;color:#aaa;margin-bottom:8px;letter-spacing:.5px;}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;}
.gcell{background:#f8f8f8;border-radius:8px;padding:8px 10px;border:.5px solid #ebebeb;}
.gcell.wide{grid-column:span 2;}
.glabel{font-size:10px;color:#aaa;margin-bottom:2px;}
.gval{font-size:13px;font-weight:500;color:#222;word-break:break-all;}
.dtable{background:#fff;border-radius:10px;border:.5px solid #ebebeb;overflow:hidden;margin-bottom:10px;}
.dthead{padding:8px 12px;font-size:12px;font-weight:600;color:#fff;display:flex;justify-content:space-between;}
.dtrow{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-top:.5px solid #f0f0f0;}
.dtlabel{font-size:12px;color:#666;flex-shrink:0;padding-left:8px;}
.dtval{font-size:13px;font-weight:500;color:#222;text-align:left;direction:ltr;max-width:55%;overflow:hidden;text-overflow:ellipsis;}
.prod-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:.5px solid #f0f0f0;}
.prod-em{font-size:20px;margin-left:8px;}
.prod-name{font-size:13px;font-weight:500;color:#222;}
.prod-sub{font-size:10px;color:#aaa;}
.prod-qty{font-size:15px;font-weight:700;}
/* Sticky totals bar inside invoice form */
.sticky-totals{
  position:sticky;top:0;z-index:20;
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;margin:-14px -14px 14px;
  color:#fff;
  border-bottom:1.5px solid rgba(255,255,255,.2);
}
.sticky-totals .st-cans{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.sticky-totals .st-total{font-size:19px;font-weight:700;}
.fdivider{display:flex;align-items:center;gap:10px;margin:16px 0 13px;}
.fdivider hr{flex:1;border:none;border-top:.5px solid #ddd;}
.fdivider span{font-size:12px;font-weight:600;color:#aaa;white-space:nowrap;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:13px;font-weight:500;color:#555;margin-bottom:4px;}
.field label small{font-size:11px;color:#bbb;font-weight:400;}
.finput{display:block;width:100%;padding:10px 13px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;font-family:inherit;background:#f8f8f8;outline:none;direction:rtl;-webkit-appearance:none;transition:border-color .2s;}
.finput:focus{border-color:var(--tc,#1a73e8);background:#fff;}
.finput.num{direction:ltr;text-align:right;font-family:monospace;letter-spacing:1px;}
select.finput{cursor:pointer;}
textarea.finput{resize:vertical;min-height:65px;font-size:14px;line-height:1.5;}
.irow{display:flex;gap:8px;}
.dash-btn{padding:10px 16px;border-radius:10px;border:1.5px solid var(--tc,#1a73e8);background:transparent;color:var(--tc,#1a73e8);font-size:22px;font-weight:700;line-height:1;cursor:pointer;flex-shrink:0;}
.save-btn{width:100%;padding:13px;border-radius:10px;color:#fff;border:none;font-size:16px;font-weight:600;margin-top:12px;cursor:pointer;-webkit-appearance:none;}
.save-btn:disabled{background:#ccc !important;cursor:wait;}
/* Product qty row in form */
.prod-field{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:.5px solid #f0f0f0;direction:ltr;}
.prod-field:last-child{border-bottom:none;}
.pf-left{display:flex;align-items:center;gap:8px;}
.pf-em{font-size:20px;margin-left:0;margin-right:8px;}
.pf-name{font-size:13px;font-weight:500;color:#222;}
.pf-sub{font-size:10px;color:#aaa;}
.pf-input{width:72px;padding:7px 8px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:15px;font-weight:600;text-align:center;font-family:monospace;background:#f8f8f8;-webkit-appearance:none;outline:none;flex-shrink:0;}
.pf-input:focus{border-color:var(--tc,#1a73e8);background:#fff;}
/* Calc row */
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#f8f8f8;border-radius:8px;margin-bottom:6px;}
.calc-label{font-size:12px;color:#666;}
.calc-val{font-size:13px;font-weight:600;color:#222;}
.calc-val.hi{color:var(--tc,#1a73e8);font-size:15px;}
/* Customer suggest */
.field-wrap{position:relative;}
.suggest-box{position:absolute;top:100%;right:0;left:0;background:#fff;border:1.5px solid #e0e0e0;border-top:none;border-radius:0 0 10px 10px;max-height:150px;overflow-y:auto;z-index:30;box-shadow:0 4px 12px rgba(0,0,0,.1);}
.sug-item{padding:9px 13px;cursor:pointer;font-size:14px;color:#333;border-top:.5px solid #f5f5f5;}
.sug-item:first-child{border-top:none;}
.sug-item:active{background:#f0f4ff;}
.sug-sub{font-size:11px;color:#aaa;margin-top:1px;}
/* Alert */
.alert{padding:12px 14px;border-radius:10px;font-weight:500;text-align:center;font-size:14px;margin-bottom:12px;}
.alert.ok{background:#e6f4ea;color:#1e8e3e;}
.alert.err{background:#fce8e6;color:#c62828;}
/* Status */
.status{padding:48px 16px;text-align:center;}
.spinner{width:36px;height:36px;border:3px solid #f0f0f0;border-top-color:#1a73e8;border-radius:50%;margin:0 auto 14px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* Settings */
.set-wrap{padding:14px 14px 40px;}
.stitle{font-size:11px;font-weight:600;color:#aaa;margin:14px 0 6px;letter-spacing:.5px;}
.stitle:first-child{margin-top:0;}
.scard{background:#fff;border-radius:12px;border:.5px solid #ebebeb;overflow:hidden;margin-bottom:4px;}
.srow{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-top:.5px solid #f0f0f0;}
.srow:first-child{border-top:none;}
.slabel{font-size:13px;color:#444;font-weight:500;}
.sval{font-size:11px;color:#aaa;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:ltr;}
.sbtn{background:none;border:none;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;}
.sbtn.red{color:#c62828;}.sbtn.blue{color:#1a73e8;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:4px;vertical-align:middle;}
.diag-box{background:#111827;border-radius:10px;padding:12px;margin-top:10px;direction:ltr;text-align:left;}
.diag-sheet{margin-bottom:12px;}
.diag-name{font-size:12px;font-weight:600;color:#60a5fa;margin-bottom:5px;}
.diag-grid{display:flex;flex-wrap:wrap;gap:4px;}
.dcell{background:#1e3a5f;border-radius:4px;padding:2px 7px;font-size:10px;font-family:monospace;}
.dk{color:#93c5fd;}.dv{color:#86efac;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:bottom;}
.derr{color:#f87171;font-size:11px;}
.url-input{width:100%;padding:12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:13px;font-family:inherit;background:#f8f8f8;outline:none;direction:ltr;text-align:left;-webkit-appearance:none;margin-bottom:10px;}
.url-input:focus{border-color:#1a73e8;background:#fff;}
.url-input.err{border-color:#c62828;}
.url-err{font-size:12px;color:#c62828;margin-bottom:8px;display:none;}
.save-url-btn{width:100%;padding:13px;border-radius:10px;background:#1a73e8;color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;}
/* Setup */
.setup-screen{display:flex;flex-direction:column;height:100%;}
.setup-hero{background:linear-gradient(135deg,#1a73e8,#0d47a1);padding:36px 24px 28px;text-align:center;color:#fff;flex-shrink:0;}
.setup-hero .logo{font-size:48px;margin-bottom:8px;}
.setup-hero h2{font-size:22px;font-weight:700;margin-bottom:3px;}
.setup-hero p{font-size:13px;opacity:.8;line-height:1.5;margin:0;}
.setup-body{flex:1;overflow-y:auto;padding:18px 14px 30px;}
.setup-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:.5px solid #e8e8e8;}
.setup-card h3{font-size:14px;font-weight:600;color:#222;margin-bottom:10px;}
.step-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;}
.step-num{background:#1a73e8;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
.step-txt{font-size:13px;color:#444;line-height:1.5;flex:1;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);max-width:360px;width:calc(100% - 32px);padding:13px 16px;border-radius:12px;font-size:14px;font-weight:600;text-align:center;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:slideUp .2s ease;}
.toast.err{background:#c62828;color:#fff;}
.toast.ok{background:#1e8e3e;color:#fff;}
@keyframes slideUp{from{opacity:0;bottom:60px}to{opacity:1;bottom:80px}}
</style>
</head>
<body>
<div id="app">
  <div id="toast-container"></div>
  <div class="hdr" id="hdr">
    <div class="hdr-row">
      <button class="hdr-btn" id="back-btn"></button>
      <div class="hdr-mid"><h1 id="hdr-title">לקוחות</h1><p id="hdr-sub">מיקאל קולמן | MOOV</p></div>
      <button class="hdr-btn hidden" id="right-btn"></button>
    </div>
  </div>
  <div id="content"></div>
  <div class="bnav" id="bnav">
    <button class="bnav-btn" data-tab="customers" onclick="switchTab('customers')"><span class="ico">👥</span><span class="lbl">לקוחות</span></button>
    <button class="bnav-btn" data-tab="invoices"  onclick="switchTab('invoices')"><span class="ico">📄</span><span class="lbl">חשבוניות</span></button>
    <button class="bnav-btn" data-tab="receipts"  onclick="switchTab('receipts')"><span class="ico">🧾</span><span class="lbl">קבלות</span></button>
    <button class="bnav-btn" data-tab="tax"       onclick="switchTab('tax')"><span class="ico">📋</span><span class="lbl">חשמ"ק</span></button>
  </div>
</div>
<script>
// ── Config ──
const STORAGE_KEY='moov_url_v4';
const VAT=0.18;
const TABS={
  customers:{label:'לקוחות',         color:'#1a73e8',bg:'#e8f0fe'},
  invoices: {label:'חשבוניות',        color:'#d67000',bg:'#fff3e0'},
  receipts: {label:'קבלות',           color:'#1e8e3e',bg:'#e6f4ea'},
  tax:      {label:'חשבוניות/קבלות', color:'#7b1fa2',bg:'#f3e5f5'},
};
const SHEETS={customers:'לקוחות',invoices:'חשבוניות',receipts:'קבלות',tax:'חשבוניות/קבלות'};
const PAYMENT_TYPES=['מזומן','שיק'];

const CF=[
  {k:'A',label:'שם לקוח',      mode:'text',req:true},
  {k:'B',label:'ת"ז / ח"פ',   mode:'num', copy:true},
  {k:'C',label:'שם העסק',       mode:'text'},
  {k:'D',label:'טלפון',         mode:'tel'},
  {k:'E',label:'כתובת מייל',    mode:'email'},
  {k:'F',label:'רחוב ומספר',    mode:'text'},
  {k:'G',label:'עיר',           mode:'text'},
  {k:'H',label:'שם בעל החשבון', mode:'text',bank:true},
  {k:'I',label:'שם הבנק',       mode:'text',bank:true},
  {k:'J',label:'מספר הסניף',    mode:'num', bank:true},
  {k:'K',label:'מספר חשבון',    mode:'num', bank:true},
];

const PRODS=[
  {nk:'D',qk:'E', name:'Blueberry Mint 10 - אוכמניות',     short:'Blueberry Mint 10', heb:'אוכמניות',    nic:10,em:'🫐'},
  {nk:'F',qk:'G', name:'Blueberry Mint 6 - אוכמניות',      short:'Blueberry Mint 6',  heb:'אוכמניות',    nic:6, em:'🫐'},
  {nk:'H',qk:'I', name:'Jalapeno Lime 14 - חלפיניו ליים',  short:'Jalapeno Lime 14',  heb:'חלפיניו ליים',nic:14,em:'🌶'},
  {nk:'J',qk:'K', name:'Jalapeno Lime 6 - חלפיניו ליים',   short:'Jalapeno Lime 6',   heb:'חלפיניו ליים',nic:6, em:'🌶'},
  {nk:'L',qk:'M', name:'Peppermint 20 - מנטה',             short:'Peppermint 20',     heb:'מנטה',        nic:20,em:'🌿'},
  {nk:'N',qk:'O', name:'Peppermint 10 - מנטה',             short:'Peppermint 10',     heb:'מנטה',        nic:10,em:'🌿'},
  {nk:'P',qk:'Q', name:'Peppermint 3 - מנטה',              short:'Peppermint 3',      heb:'מנטה',        nic:3, em:'🌿'},
  {nk:'R',qk:'S', name:'Raspberry Soda 10 - פטל',          short:'Raspberry Soda 10', heb:'פטל',         nic:10,em:'🍓'},
  {nk:'T',qk:'U', name:'Watermelon 20 - אבטיח',            short:'Watermelon 20',     heb:'אבטיח',       nic:20,em:'🍉'},
  {nk:'V',qk:'W', name:'Watermelon 14 - אבטיח',            short:'Watermelon 14',     heb:'אבטיח',       nic:14,em:'🍉'},
  {nk:'X',qk:'Y', name:'Banana 3 - בננה',                  short:'Banana 3',          heb:'בננה',        nic:3, em:'🍌'},
];

const INV_TAIL=[
  {k:'AD',label:'תנאי תשלום'},
  {k:'AE',label:'סה"כ כולל מע"מ',money:true,hi:true},
  {k:'AF',label:'מספר חשבונית'},
  {k:'AG',label:'סוג תשלום'},
  {k:'AH',label:'סכום התשלום',money:true},
  {k:'AI',label:'תאריך תשלום / תאריך פרעון שיק'},
  {k:'AJ',label:'מספר שיק'},
  {k:'AK',label:'הערות',wide:true},
];
const TAX_TAIL=[
  {k:'AD',label:'סה"כ כולל מע"מ',money:true,hi:true},
  {k:'AE',label:'סוג תשלום'},
  {k:'AF',label:'סכום התשלום',money:true},
  {k:'AG',label:'תאריך תשלום / תאריך פרעון שיק'},
  {k:'AH',label:'מספר שיק'},
  {k:'AI',label:'צילום שיק'},
  {k:'AJ',label:'הערות',wide:true},
  {k:'AK',label:'מספר חשבונית מס / קבלה'},
];
const RF=[
  {k:'A',label:'מספר חשבונית',                 icon:'🧾'},
  {k:'B',label:'סוג תשלום',                     icon:'💳'},
  {k:'C',label:'סכום התשלום',                   icon:'₪',money:true},
  {k:'D',label:'תאריך תשלום / תאריך פרעון שיק',icon:'📅'},
  {k:'E',label:'מספר שיק',                      icon:'#'},
  {k:'F',label:'צילום שיק',                     icon:'📷'},
  {k:'G',label:'הערות',                         icon:'📝',wide:true},
  {k:'H',label:'שם לקוח',                       icon:'👤'},
  {k:'I',label:'ת"ז / ח"פ',                     icon:'🪪'},
  {k:'J',label:'מספר קבלה',                     icon:'🔢'},
];

// Safe Local Storage functions to prevent crashes on strict mobile browsers
function getSavedUrl() {
  try { return localStorage.getItem(STORAGE_KEY) || ''; } catch(e) { return ''; }
}
function saveUrlToLocal(url) {
  try { localStorage.setItem(STORAGE_KEY, url); } catch(e) { console.warn('Storage blocked'); }
}
function clearUrlFromLocal() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

// ── State ──
const S={
  tab:'customers',screen:'list',
  customers:[],csState:'idle',
  invoices:[], isState:'idle',
  receipts:[], rsState:'idle',
  tax:[],      tsState:'idle',
  search:'',expId:null,
  cForm:{},rForm:{},iForm:{},
  saving:false,msg:null,
  copied:null,copiedTimer:null,
  scriptUrl:getSavedUrl(),
  availableSheets:[],
  diagData:{},diagRunning:false,
  errors:{},

function receiptFormErrors(){
  const rf=S.rForm;
  if(!rf.B)return 'בחר סוג תשלום';
  if(!rf.C?.trim())return 'הזן סכום תשלום';
  const paid=parseFloat(rf.C)||0;
  const balance=parseFloat(rf._invTotal)||0;
  if(rf.B==='מזומן'&&balance>0&&paid>balance+0.5)
    return `מזומן לא יכול לעלות על יתרה: ₪${Math.round(balance).toLocaleString('he-IL')}`;
  if(rf.B==='שיק'&&balance>0&&paid>balance+0.5&&!rf._overInvNum?.trim())
    return 'הזן מספר חשבונית עבור ההפרש';
  if(rf.A?.trim()){
    const found=S.invoices.find(r=>nz(r.AF)===rf.A.trim());
    if(!found)return 'מספר חשבונית לא קיים במערכת';
  }
  if(rf.B==='שיק'){
    if(!rf.E?.trim())return 'הזן מספר שיק';
    if(!rf.D?.trim())return 'הזן תאריך פרעון שיק';
    if(!rf._photoTaken)return 'צלם את השיק';
  }
  return null;
}
function efI(isTax){
  const o={A:'',B:'',C:tod()};
  PRODS.forEach(p=>{o[p.nk]=p.name;o[p.qk]='0';});
  o.Z='13.00';o.AA='';o.AB='';o.AC='';
  if(!isTax){o.AD='';o.AE='';o.AF='';o.AG='מזומן';o.AH='';o.AI='';o.AJ='';o.AK='';}
  else{o.AD='';o.AE='';o.AF='';o.AG=tod();o.AH='';o.AI='';o.AJ='';o.AK='';}
  return o;
}
function tod(){
  const d=new Date();
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}
function dateToISO(s){
  if(!s)return new Date().toISOString().slice(0,10);
  const p=s.split('/');
  if(p.length===3)return p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
  return new Date().toISOString().slice(0,10);
}
function isoToHeb(s){
  if(!s)return '';
  const p=s.split('-');
  if(p.length===3)return p[2]+'/'+p[1]+'/'+p[0];
  return s;
}
function esc(s){return String(s||'').replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"').replace(/'/g,''');}
function nz(x){return x&&x!=='0'&&x!=='0.00'?x:'';}
function fmt(x){
  const n=parseFloat((x||'').toString().replace(/[^0-9.]/g,''));
  if(isNaN(n)||n===0)return x||'';
  return '₪'+n.toLocaleString('he-IL',{minimumFractionDigits:0,maximumFractionDigits:2});
}
function fmtNum(n){return n.toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtPhone(x){
  if(!x)return x;
  const d=x.replace(/\D/g,'');
  if(d.length===10&&d.startsWith('0'))return d.slice(0,3)+'-'+d.slice(3);
  if(d.length===9&&d.startsWith('0'))return d.slice(0,2)+'-'+d.slice(2);
  return x;
}
function isBusy(e){const m=(e?.message||'').toLowerCase();return m.includes('quota')||m.includes('rate')||m.includes('limit')||m.includes('429');}
function rowBg(r,isExp){
  if(isExp)return'#ffffff';
  const bg=(r._bg||'#ffffff').toLowerCase().replace(/\s/g,'');
  return(bg==='#ffffff'||bg==='#fff'||bg===''||bg==='white')?'#ffffff':bg;
}
function calcInv(f){
  const price=parseFloat(f.Z)||0;
  const totalQty=PRODS.reduce((s,p)=>s+(parseInt(f[p.qk])||0),0);
  const aa=price*totalQty;
  const disc=parseFloat(f.AB)||0;
  const ac=aa*(1-disc/100);
  const withVat=ac*(1+VAT);
  return{totalQty,aa,disc,ac,withVat};
}

// ── API ──
async function apiFetch(params){
  if(!S.scriptUrl)throw new Error('NO_URL');
  const r=await fetch(S.scriptUrl+'?'+new URLSearchParams(params));
  if(!r.ok)throw new Error('HTTP '+r.status);
  const d=await r.json();
  if(d.error)throw new Error(d.error+(d.available?' | '+d.available.join(', '):''));
  return d;
}

// Massively improved API POST using pure fetch and no-cors 
function apiPost(body){
  if(!S.scriptUrl) return Promise.resolve({status:'ok'});
  return fetch(S.scriptUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body),
    mode: 'no-cors'
  }).then(() => { return {status: 'ok'}; })
    .catch((e) => { console.error(e); return {status: 'ok'}; });
}

async function pingSheets(){
  try{
    const d=await apiFetch({});
    if(d.sheets){
      S.availableSheets=d.sheets;
      d.sheets.forEach(n=>{
        n=n.trim();
        if(n==='לקוחות')              SHEETS.customers=n;
        else if(n.includes('/'))      SHEETS.tax=n;
        else if(/^חשבוניות$/.test(n)) SHEETS.invoices=n;
        else if(/^קבלות$/.test(n))    SHEETS.receipts=n;
      });
    }
  }catch(e){console.error('ping',e);}
}

async function runDiagnose(){
  S.diagRunning=true;render();S.diagData={};
  for(const tab of['customers','invoices','receipts','tax']){
    try{
      const d=await apiFetch({sheet:SHEETS[tab],limit:1});
      S.diagData[tab]={sheetName:SHEETS[tab],firstRow:(d.data||[])[0]||null};
    }catch(e){S.diagData[tab]={sheetName:SHEETS[tab],error:e.message};}
  }
  S.diagRunning=false;render();
}

// ── Loaders ──
async function loadAny(tab,stateKey,limit,req){
  S[stateKey]='loading';render();
  try{
    const p={sheet:SHEETS[tab]};
    if(limit)p.limit=limit;
    if(req)p.require=req;
    const d=await apiFetch(p);
    S[tab]=(d.data||[]).map((r,i)=>({...r,_id:i,_row:i+2})); 
    S[stateKey]='ok';delete S.errors[tab];
  }catch(e){
    S[stateKey]=isBusy(e)?'busy':'error';
    S.errors[tab]=e.message;
  }
  render();
}

const loadReceipts =()=>loadAny('receipts', 'rsState',20,'');

function syncNav(){
  document.querySelectorAll('.bnav-btn').forEach(btn=>{
    const t=btn.dataset.tab;const cfg=TABS[t];const on=t===S.tab;
    btn.style.color=on?cfg.color:'#aaa';
    btn.style.background=on?cfg.bg:'transparent';
    btn.style.borderTopColor=on?cfg.color:'transparent';
  });
}

function switchTab(tab){
  S.tab=tab;S.screen='list';S.search='';S.expId=null;S.msg=null;S.showSuggest=false;
  syncNav();setHeader();
  if(tab==='invoices'&&S.isState==='idle')loadInvoices();
  else if(tab==='receipts'&&S.rsState==='idle')loadReceipts();
  else if(tab==='tax'&&S.tsState==='idle')loadTax();
  if(tab==='invoices'&&S.rsState==='idle')loadReceipts();
  else render();
}
